<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Stopwatch</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-5">
        <div class="card mt-5">
          <div class="card-body">
            <div>
              <h1 class="text-center">
                <span id="hr">00:</span><span id="min">00:</span><span id="sec">00</span>
              </h1>
            </div>
            <div class="d-flex justify-content-between text-white">
              <button id="stbtn" class="btn btn-primary">start</button>
              <button id="spbtn" class="btn btn-dark">stop</button>
              <button id="rsbtn" class="btn btn-danger">reset</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let hrtag = document.getElementById('hr');
    let mintag = document.getElementById('min');
    let sectag = document.getElementById('sec');
    let stbtn = document.getElementById('stbtn');
    let spbtn = document.getElementById('spbtn');
    let rsbtn = document.getElementById('rsbtn');

    let count = 0;
    let intervalid = null;

    // Start button
    stbtn.addEventListener('click', () => {
      stbtn.disabled = true;
      spbtn.disabled = false;
      rsbtn.disabled = true;
      startInterval();
    });

    // Stop button
    spbtn.addEventListener('click', () => {
      stbtn.disabled = false;
      spbtn.disabled = true;
      rsbtn.disabled = false;
      stopInterval();
    });

    // Reset button
    rsbtn.addEventListener('click', () => {
      resetWatch();
    });

    // Start interval
    function startInterval() {
      if (intervalid) return; // prevent multiple intervals
      intervalid = setInterval(() => {
        count += 1000;
        display();
      }, 1000);
    }

    // Stop interval
    function stopInterval() {
      clearInterval(intervalid);
      intervalid = null;
    }

    // Reset watch
    function resetWatch() {
      stopInterval();
      count = 0;
      display();
    }

    // Display function
    function display() {
      let sec = Math.trunc(count / 1000) % 60;
      let min = Math.trunc(count / 1000 / 60) % 60;
      let hr = Math.trunc(count / 1000 / 60 / 60);

      sectag.innerText = sec > 9 ? sec : '0' + sec;
      mintag.innerText = (min > 9 ? min : '0' + min) + ":";
      hrtag.innerText = (hr > 9 ? hr : '0' + hr) + ":";
    }

    // Initialize display
    display();
  </script>
</body>
</html>
